<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA ONE Academy | Productos</title>

<link rel="stylesheet" href="/src/css/app.css">
<link rel="stylesheet" href="/src/css/modal.css">

</head>
<body>

<div class="dashboard">

<div id="sidebar"></div>

<main class="content">

<div id="topbar"></div>


<div style="margin:20px 0;">
    <input
        id="buscarProducto"
        type="text"
        placeholder="🔍 Buscar producto..."
        style="width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;">
</div>

<section class="card">

<table id="tablaProductos">

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Stock</th>
<th>Precio</th>
<th>Acciones</th>

</tr>

</thead>

<tbody></tbody>

</table>

</section>

</main>

</div>

<div class="modal" id="modalProducto">

<div class="modal-content">

<div class="modal-header">

<h2>Nuevo Producto</h2>

<button class="close-modal" id="cerrarModal">
✖
</button>

</div>

<div class="form-grid">

<div class="form-group">

<label>Nombre</label>

<input id="nombreProducto">

</div>

<div class="form-group">

<label>Stock</label>

<input
id="stockProducto"
type="number">

</div>

<div class="form-group">

<label>Precio</label>

<input
id="precioProducto"
type="number">

</div>

</div>

<div class="modal-footer">

<button
class="btn-secondary"
id="cancelarProducto">

Cancelar

</button>

<button
class="btn-primary"
id="guardarProducto">

Guardar

</button>

</div>

</div>

</div>

<script src="/src/js/productos.js"></script>


<script src="/src/js/loader.js"></script>
</body>
</html>
