<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NOVA ONE POS - Ventas</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#1d4ed8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.categorias{
display:flex;
gap:10px;
padding:15px;
overflow:auto;
}

.categorias button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
}

.productos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.producto{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
font-size:20px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.ticket{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.ticket button{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
NOVA ONE POS - Modo Cafetería
</div>

<div class="categorias">
<button>☕ Cafés</button>
<button>🥤 Frías</button>
<button>🥐 Pan</button>
<button>🍰 Postres</button>
<button>🍟 Snacks</button>
</div>

<div class="main">

<div class="productos">

<div class="producto">☕<br>Latte<br>$65</div>

<div class="producto">☕<br>Americano<br>$45</div>

<div class="producto">🥤<br>Frappé<br>$85</div>

<div class="producto">🍰<br>Cheesecake<br>$70</div>

<div class="producto">🥐<br>Croissant<br>$35</div>

<div class="producto">🥤<br>Té Helado<br>$40</div>

</div>

<div class="ticket">

<h2>🧾 Ticket</h2>

<p>Latte .......... $65</p>

<p>Croissant .... $35</p>

<hr>

<h2>Total $100</h2>

<button>🖨️ Comanda</button>

<button>💳 Cobrar</button>

</div>

</div>

</body>
</html>
